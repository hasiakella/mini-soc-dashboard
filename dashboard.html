
<!DOCTYPE html>
<html>
<head>
<title>Mini SOC Dashboard</title>

<style>

body {
font-family: Arial;
background:#f4f4f4;
padding:20px;
}

.card {
background:white;
padding:20px;
margin:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

.high {
color:red;
font-weight:bold;
}

.medium {
color:orange;
font-weight:bold;
}

.low {
color:green;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🛡 MINI SOC DASHBOARD</h1>

<div class="card">
<h2>Network Security Report</h2>

<p>Open Ports : 2</p>

<p>Services : ssh, http</p>

<p class="medium">
Risk Level : MEDIUM
</p>

</div>

</body>
</html>
